<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sigma Eta Pi | People</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: { extend: {
      colors: { phoenix: "#2C4A73", "phoenix-bright": "#1b2a8c", ink: "#101828", midnight: "#101828", navy: "#1F3A5F", slateblue: "#516B84", cloud: "#F8FAFC", mist: "#A7B6C5", steel: "#6B7280", coolgray: "#D1D5DB", stone: "#E5E7EB", charcoal: "#374151", oxford: "#2C4A73", powder: "#BFCFDD", graphite: "#4B5563", pop: "#1b2a8c" },
      fontFamily: { sans: ["Karla", "sans-serif"], display: ["Fraunces", "serif"] },
    } },
  };
</script>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Karla:ital,wght@0,400..800;1,400..800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0&display=swap" rel="stylesheet"/>
<style>
  html { scroll-behavior: smooth; }
  body { color: #101828; font-family: "Karla", sans-serif; overflow-x: hidden; -webkit-font-smoothing: antialiased;
    background-color: #F8FAFC;
    background-image:
      radial-gradient(50% 38% at 18% 8%, rgba(31,58,95,0.05), transparent 70%),
      radial-gradient(45% 38% at 85% 22%, rgba(81,107,132,0.04), transparent 70%),
      radial-gradient(55% 45% at 50% 96%, rgba(31,58,95,0.05), transparent 72%);
    background-repeat: no-repeat, no-repeat, no-repeat;
    background-attachment: fixed; }
  /* Brand type: Fraunces 600 for headlines + logo lockups; Karla carries everything else */
  h1, h2, h3, h4, .brand-lockup { font-family: "Fraunces", serif !important; font-weight: 600 !important; }
  .label { font-family: "Karla", sans-serif; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; }
  .hairline { border-color: rgba(255,255,255,0.14); }
  ::selection { background: #1F3A5F; color: #fff; }
  .material-symbols-outlined { font-variation-settings: "FILL" 0, "wght" 300, "GRAD" 0, "opsz" 24; }

  /* tabs */
  .tab { font-family: "Karla", sans-serif; font-weight: 500; font-size: .82rem; letter-spacing: .04em; padding: .65rem 1.5rem;
    border-radius: 11px; border: 1px solid #D1D5DB; color: #6B7280; background: #fff; transition: all .25s ease; cursor: pointer; }
  .tab:hover { color: #101828; border-color: #516B84; }
  .tab-active { background: #1F3A5F; border-color: #1F3A5F; color: #fff; box-shadow: 0 10px 24px rgba(31,58,95,.25); }

  /* member cards — cut-out headshot on a navy gradient; card + photo scale together on hover */
  .member-frame { position: relative; aspect-ratio: 1 / 1.06;
    transition: transform .35s cubic-bezier(.2,.8,.2,1.05); will-change: transform; }
  .member:hover .member-frame { transform: scale(1.05); }
  .member-card { position: absolute; inset: 0; border-radius: 16px; overflow: hidden;
    background: linear-gradient(165deg, #101828 0%, #1F3A5F 60%, #516B84 100%);
    box-shadow: 0 12px 32px rgba(16,24,40,.22), inset 0 0 0 1px rgba(255,255,255,.07); transition: box-shadow .35s ease; }
  .member-photo { position: absolute; left: 50%; bottom: 0; transform: translateX(-50%); width: 100%; height: 100%; max-width: none;
    object-fit: cover; object-position: bottom; filter: drop-shadow(0 8px 18px rgba(16,24,40,.35)); }
  .member:hover .member-card { box-shadow: 0 22px 54px rgba(31,58,95,.4), inset 0 0 0 1px rgba(167,182,197,.65); }
  /* founder company badge — sits inside the bottom-right corner of the card */
  .founder-badge { position: absolute; right: 10px; bottom: 10px; z-index: 6; width: 78px; height: 78px; border-radius: 14px;
    background: #fff; display: flex; align-items: center; justify-content: center; padding: 9px;
    box-shadow: 0 6px 18px rgba(16,24,40,.25), 0 0 0 1px #D1D5DB; }
  .founder-badge img { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }

  /* expanding header — solid Midnight bar (page body is light), shrinks on scroll */
  #topnav { background:#101828; transition: background .4s ease, box-shadow .4s ease, border-color .4s ease; border-bottom:1px solid transparent; }
  #topnav #navbar { height:7.5rem; transition: height .4s ease; }
  #topnav #navLogo { height:3.5rem; transition: height .4s ease; }
  #topnav #navWordmark { opacity:1; max-width:16rem; overflow:hidden;
    transition: opacity .35s ease, max-width .4s ease, margin .4s ease; text-shadow:0 2px 16px rgba(4,6,15,.7); }
  #navLinks a { font-size:.8rem; transition: font-size .4s ease; }
  #topnav.scrolled { background: rgba(16,24,40,0.92); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border-color: rgba(255,255,255,0.1); box-shadow:0 10px 30px rgba(16,24,40,.25); }
  #topnav.scrolled #navbar { height:5rem; }
  #topnav.scrolled #navLogo { height:2.25rem; }
  #topnav.scrolled #navWordmark { opacity:0; max-width:0; margin-left:-0.75rem; text-shadow:none; }
  #topnav.scrolled #navLinks a { font-size:.66rem; }
  @keyframes navIn { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:none; } }
  .nav-fade { animation: navIn .7s ease both; animation-delay: var(--d,0s); }
  @media (prefers-reduced-motion: reduce) { .nav-fade { animation: none; } }
</style>
</head>
<body>

<!-- NAV -->
<nav id="topnav" class="fixed top-0 inset-x-0 z-50">
  <div id="navbar" class="relative max-w-6xl mx-auto px-6 flex items-center justify-between">
    <a href="home.html" class="flex items-center gap-3 nav-fade" style="--d:0s" aria-label="Sigma Eta Pi — Home">
      <img src="assets/emblem-white.png" alt="Sigma Eta Pi phoenix" id="navLogo" class="w-auto"/>
      <span id="navWordmark" class="brand-lockup font-black leading-[1.02] text-white text-2xl whitespace-nowrap">Sigma<br/>Eta&nbsp;Pi™</span>
    </a>
    <div id="navLinks" class="hidden md:flex items-center gap-7">
      <a href="community.html" class="nav-fade label text-white/70 hover:text-white transition-colors" style="--d:.12s">About</a>
      <a href="roster.html" class="nav-fade label text-powder transition-colors" style="--d:.2s">People</a>
      <a href="program.html" class="nav-fade label text-white/70 hover:text-white transition-colors" style="--d:.28s">Growth</a>
      <a href="recruitment.html" class="nav-fade label px-5 py-2 rounded-full bg-phoenix text-white hover:bg-phoenix-bright transition-colors" style="--d:.36s">Recruitment</a>
    </div>
    <button id="navToggle" class="md:hidden relative z-10 -mr-1 w-10 h-10 flex items-center justify-center text-white" aria-label="Open menu" aria-expanded="false">
      <svg id="navIconOpen" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-6 h-6"><path d="M3 6h18M3 12h18M3 18h18" stroke-linecap="round"/></svg>
      <svg id="navIconClose" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-6 h-6 hidden"><path d="M6 6l12 12M18 6L6 18" stroke-linecap="round"/></svg>
    </button>
  </div>
  <div id="mobileMenu" class="md:hidden hidden mx-4 mb-3 rounded-2xl border border-white/10 bg-[#101828]/95 backdrop-blur-xl overflow-hidden">
    <a href="community.html" class="block label text-sm px-6 py-4 text-white/80 hover:bg-white/5 border-b border-white/5">About</a>
    <a href="roster.html" class="block label text-sm px-6 py-4 text-white/80 hover:bg-white/5 border-b border-white/5">People</a>
    <a href="program.html" class="block label text-sm px-6 py-4 text-white/80 hover:bg-white/5 border-b border-white/5">Growth</a>
    <a href="recruitment.html" class="block label text-sm px-6 py-4 text-powder hover:bg-white/5">Recruitment</a>
  </div>
</nav>

<!-- HEADER -->
<header class="pt-40 pb-12 px-6 text-center">
  <div class="max-w-4xl mx-auto">
    <p class="label text-[11px] text-pop mb-5">One Family</p>
    <h1 class="text-6xl md:text-8xl font-black tracking-tight leading-[0.9]">People</h1>
    <p class="mt-6 text-lg text-steel max-w-xl mx-auto">Meet the people building Sigma Eta Pi at Miami University.</p>
    <div class="mt-10 flex items-center justify-center gap-3">
      <button id="tabExec" class="tab tab-active">Executive Board</button>
      <button id="tabMembers" class="tab">Our People</button>
    </div>
  </div>
</header>

<main class="max-w-6xl mx-auto px-6 pb-24">
  <div id="execView"></div>
  <div id="membersView" class="hidden"></div>
</main>

<!-- FOOTER -->
<footer class="border-t hairline bg-midnight px-6 py-16">
    <!-- top row: phoenix lockup · socials -->
    <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-8 text-center md:text-left">
      <a href="home.html" class="flex items-center gap-5" aria-label="Sigma Eta Pi home">
        <img src="assets/emblem-white.png" alt="Sigma Eta Pi phoenix" class="h-16 w-auto"/>
        <span class="leading-none">
          <span class="brand-lockup block text-3xl font-black tracking-tight text-white">Sigma Eta Pi</span>
          <span class="block mt-1 text-xl font-medium text-white/45">@ Miami University</span>
        </span>
      </a>

      <div class="flex items-center justify-center gap-4">
        <a href="https://www.instagram.com/sigmaetapimu/" target="_blank" rel="noopener" aria-label="Instagram" class="w-11 h-11 border hairline rounded-full flex items-center justify-center text-white/80 hover:border-powder hover:text-powder transition-colors">
          <svg viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5"><path d="M12 2.16c3.2 0 3.58.01 4.85.07 1.17.05 1.8.25 2.23.41.56.22.96.48 1.38.9.42.42.68.82.9 1.38.16.42.36 1.06.41 2.23.06 1.27.07 1.65.07 4.85s-.01 3.58-.07 4.85c-.05 1.17-.25 1.8-.41 2.23-.22.56-.48.96-.9 1.38-.42.42-.82.68-1.38.9-.42.16-1.06.36-2.23.41-1.27.06-1.65.07-4.85.07s-3.58-.01-4.85-.07c-1.17-.05-1.8-.25-2.23-.41-.56-.22-.96-.48-1.38-.9-.42-.42-.68-.82-.9-1.38-.16-.42-.36-1.06-.41-2.23C2.17 15.58 2.16 15.2 2.16 12s.01-3.58.07-4.85c.05-1.17.25-1.8.41-2.23.22-.56.48-.96.9-1.38.42-.42.82-.68 1.38-.9.43-.16 1.06-.36 2.23-.41C8.42 2.17 8.8 2.16 12 2.16M12 0C8.74 0 8.33.01 7.05.07 5.78.13 4.9.33 4.14.63c-.79.31-1.46.72-2.13 1.38C1.35 2.68.94 3.35.63 4.14.33 4.9.13 5.78.07 7.05.01 8.33 0 8.74 0 12s.01 3.67.07 4.95c.06 1.27.26 2.15.56 2.91.31.79.72 1.46 1.38 2.13.67.66 1.34 1.07 2.13 1.38.76.3 1.64.5 2.91.56C8.33 23.99 8.74 24 12 24s3.67-.01 4.95-.07c1.27-.06 2.15-.26 2.91-.56.79-.31 1.46-.72 2.13-1.38.66-.67 1.07-1.34 1.38-2.13.3-.76.5-1.64.56-2.91.06-1.28.07-1.69.07-4.95s-.01-3.67-.07-4.95c-.06-1.27-.26-2.15-.56-2.91-.31-.79-.72-1.46-1.38-2.13C21.32 1.35 20.65.94 19.86.63 19.1.33 18.22.13 16.95.07 15.67.01 15.26 0 12 0zm0 5.84A6.16 6.16 0 1 0 18.16 12 6.16 6.16 0 0 0 12 5.84zm0 10.16A4 4 0 1 1 16 12a4 4 0 0 1-4 4zm6.41-10.4a1.44 1.44 0 1 1-1.44-1.44 1.44 1.44 0 0 1 1.44 1.44z"/></svg>
        </a>
        <a href="https://www.linkedin.com/company/sigma-eta-pi-miami-university/" target="_blank" rel="noopener" aria-label="LinkedIn" class="w-11 h-11 border hairline rounded-full flex items-center justify-center text-white/80 hover:border-powder hover:text-powder transition-colors">
          <svg viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5"><path d="M20.45 20.45h-3.56v-5.57c0-1.33-.02-3.04-1.85-3.04-1.85 0-2.13 1.45-2.13 2.94v5.67H9.35V9h3.41v1.56h.05c.48-.9 1.64-1.85 3.37-1.85 3.6 0 4.27 2.37 4.27 5.46v6.28zM5.34 7.43a2.06 2.06 0 1 1 0-4.13 2.06 2.06 0 0 1 0 4.13zM7.12 20.45H3.56V9h3.56v11.45zM22.22 0H1.77C.79 0 0 .77 0 1.72v20.56C0 23.23.79 24 1.77 24h20.45c.98 0 1.78-.77 1.78-1.72V1.72C24 .77 23.2 0 22.22 0z"/></svg>
        </a>
      </div>
    </div>

    <!-- divider + copyright -->
    <div class="max-w-6xl mx-auto mt-12 pt-6 border-t hairline label text-[10px] text-white/30 text-center">© 2026 Sigma Eta Pi · Omicron Chapter, Miami University</div>
  </footer>

<script>
  // expanding header: shrink to the compact bar once scrolled
  (function(){ const nav=document.getElementById("topnav"); if(nav){ const f=()=>nav.classList.toggle("scrolled", scrollY>24); addEventListener("scroll", f, {passive:true}); f(); } })();

  // Member data — name, graduating class, role (exec only), and public links.
  // To flesh out full profiles later, add fields: major, bio, company, skills, etc.
  const MEMBERS = [
    // Juniors — Class of 2027
    { f: "Zach", l: "Carlo", grad: 2027, img: "assets/headshots/zach-carlo.png", li: "https://www.linkedin.com/in/carlozd/", ig: "zach_carlo", co: "founders-fair" },
    { f: "CJ", l: "DeBra", grad: 2027, role: "VP of Recruitment", img: "assets/headshots/cj-debra.png", li: "https://www.linkedin.com/in/debracj/", ig: "cyandebraa", co: "founders-fair" },
    { f: "Sarah", l: "Bosse", grad: 2027, role: "VP of Culture", img: "assets/headshots/sarah-bosse.png", li: "https://www.linkedin.com/in/sarahbosse", ig: "sarahbosse__" },
    { f: "Alex", l: "Canupp", grad: 2027, img: "assets/headshots/alex-canupp.png", li: "https://www.linkedin.com/in/alex-canupp/", ig: "Alex.canupp" },
    { f: "Canaan", l: "Sturdevant", grad: 2027, role: "VP of External Partners", img: "assets/headshots/canaan-sturdevant.png", li: "https://www.linkedin.com/in/canaan-sturdevant/" },
    { f: "Olivia", l: "Langsdorf", grad: 2027, role: "VP of Marketing", img: "assets/headshots/olivia-langsdorf.png", li: "https://www.linkedin.com/in/olivia-langsdorf", ig: "olivialangsdorff" },
    // Sophomores — Class of 2028
    { f: "Jayden", l: "Huszczo", grad: 2028, img: "assets/headshots/jayden-huszczo.png", li: "https://www.linkedin.com/in/jayden-huszczo/", ig: "jayden.huszczo", co: "huzzsco" },
    { f: "Johnny", l: "Spicer", grad: 2028, img: "assets/headshots/johnny-spicer.png", li: "https://www.linkedin.com/in/jonathan-spicer1/", co: "chores" },
    { f: "Andy", l: "Robbins", grad: 2028, img: "assets/headshots/andy-robbins.png", li: "https://www.linkedin.com/in/andy-robbins/", co: "aia" },
    { f: "Aidan", l: "Zarski", grad: 2028, img: "assets/headshots/aidan-zarski.png", li: "https://www.linkedin.com/in/aidan-zarski-657452267/", co: "noal" },
    { f: "Aidan", l: "Allshouse", grad: 2028, li: "https://www.linkedin.com/in/adian-allshouse/" },
    { f: "Ella", l: "Rumpke", grad: 2028, img: "assets/headshots/ella-rumpke.png", li: "https://www.linkedin.com/in/ellarumpke", ig: "ellarumpke" },
    { f: "Noah", l: "Kruthaupt", grad: 2028, role: "VP of Mentorship", img: "assets/headshots/noah-kruthaupt.png", li: "https://www.linkedin.com/in/noahkruthaupt/", ig: "builtbynak", co: "aia" },
    { f: "Karthik", l: "Ashokprabhu", grad: 2028, role: "VP of Professionalism", img: "assets/headshots/karthik-ashokprabhu.png", li: "https://www.linkedin.com/in/karthik-ashokprabhu/" },
    { f: "Brandon", l: "Gonzalez Ramirez", grad: 2028, role: "VP of Finance", img: "assets/headshots/brandon-gonzalez-ramirez.png", li: "https://www.linkedin.com/in/brandon-ramirez-gonzalez/", ig: "brandon.ramirezs" },
    { f: "AJ", l: "Pecka", grad: 2028, img: "assets/headshots/aj-pecka.png", li: "https://www.linkedin.com/in/anthony-pecka/" },
    // Freshmen — Class of 2029
    { f: "Wyatt", l: "Borbi", grad: 2029, role: "Co-President", img: "assets/headshots/wyatt-borbi.png", li: "https://www.linkedin.com/in/wyatt-borbi/", ig: "wborbi5" },
    { f: "Madison", l: "Repass", grad: 2029, role: "Co-President", img: "assets/headshots/madison-repass.png", li: "https://www.linkedin.com/in/madison-repass/", ig: "mads4osu" },
    { f: "Sam", l: "Yeh", grad: 2029, li: "https://www.linkedin.com/in/samheyyeh/", ig: "yeh4sam", co: "flexform" },
    { f: "Zak", l: "Amedia", grad: 2029, img: "assets/headshots/zak-amedia.png", li: "https://www.linkedin.com/in/zakarie-amedia-586282381/", ig: "zakarieamedia", co: "pepti-ai" },
    { f: "Vlad", l: "Gorbachuck", grad: 2029, img: "assets/headshots/vlad-gorbachuck.png", li: "https://www.linkedin.com/in/vladgg333/", co: "pepti-ai" },
    { f: "Andrew", l: "Pellegrino", grad: 2029, img: "assets/headshots/andrew-pellegrino.png", li: "https://www.linkedin.com/in/andrew-pellegrino123/", ig: "andrewkin15", co: "rackramp" },
    { f: "Olivia", l: "Schaurer", grad: 2029, img: "assets/headshots/olivia-schaurer.png", li: "https://www.linkedin.com/in/oliviaschaurer/", ig: "oliviaroses11" },
    { f: "Marco", l: "Stazi", grad: 2029, img: "assets/headshots/marco-stazi.png", li: "https://www.linkedin.com/in/marcogstazi", ig: "marco_stazi" },
    { f: "Blaine", l: "Schmitz", grad: 2029, img: "assets/headshots/blaine-schmitz.png", li: "https://www.linkedin.com/in/blaine-schmitz-56b116399/", ig: "bschmitz_25" },
    { f: "Trent", l: "Allen", grad: 2029, img: "assets/headshots/trent-allen.png", li: "https://www.linkedin.com/in/trenton-allen-b90ba2383/", ig: "trentallen429" },
    { f: "Kiely", l: "Kemph", grad: 2029, img: "assets/headshots/kiely-kemph.png", li: "https://www.linkedin.com/in/kiely-kemph/", ig: "Kiely_Kemph" },
  ];

  const igUrl = (h) => "https://www.instagram.com/" + h.replace(/^@/, "") + "/";

  const card = (m, sub) => {
    const link = m.li ? m.li.trim() : (m.ig ? igUrl(m.ig) : "");
    const initials = (m.f[0] + (m.l[0] || "")).toUpperCase();
    const face = m.img
      ? `<div class="member-card"><img class="member-photo" src="${m.img}" alt="${m.f} ${m.l}" loading="lazy"/></div>`
      : `<div class="member-card grid place-items-center"><span class="text-5xl font-black text-white/30">${initials}</span></div>`;
    const badge = m.co ? `<div class="founder-badge" title="Founder"><img src="assets/logos/${m.co}.png" alt="" loading="lazy"/></div>` : "";
    const o = link ? `<a href="${link}" target="_blank" rel="noopener"` : "<div";
    const c = link ? "</a>" : "</div>";
    return `${o} class="member group block">
      <div class="member-frame">${face}${badge}</div>
      <p class="mt-4 font-bold text-center leading-tight">${m.f} ${m.l}</p>
      <p class="text-center text-sm text-steel mt-0.5">${sub}</p>
    ${c}`;
  };

  const grid = (html) => `<div class="grid grid-cols-2 lg:grid-cols-4 gap-x-6 gap-y-12">${html}</div>`;

  // Executive Board — members with a role, ordered by seniority
  const rolePriority = ["Co-President", "VP of Finance", "VP of Recruitment", "VP of External Partners", "VP of Mentorship", "VP of Marketing", "VP of Professionalism", "VP of Culture"];
  const exec = MEMBERS.filter((m) => m.role).sort((a, b) => rolePriority.indexOf(a.role) - rolePriority.indexOf(b.role));
  document.getElementById("execView").innerHTML = grid(exec.map((m) => card(m, m.role)).join(""));

  // Members — one Founding Class, sorted by graduating year
  const sorted = [...MEMBERS].sort((a, b) => a.grad - b.grad || a.l.localeCompare(b.l));
  document.getElementById("membersView").innerHTML = `
    <div class="flex items-center gap-4 mb-10">
      <h2 class="text-2xl font-black tracking-tight">Founding Class</h2>
      <span class="label text-[10px] text-steel">${sorted.length} members</span>
      <div class="flex-1 h-px bg-stone"></div>
    </div>
    ${grid(sorted.map((m) => card(m, "Class of " + m.grad)).join(""))}`;

  // tab switching
  const tabExec = document.getElementById("tabExec"), tabMembers = document.getElementById("tabMembers");
  const execView = document.getElementById("execView"), membersView = document.getElementById("membersView");
  function show(isExec) {
    execView.classList.toggle("hidden", !isExec);
    membersView.classList.toggle("hidden", isExec);
    tabExec.classList.toggle("tab-active", isExec);
    tabMembers.classList.toggle("tab-active", !isExec);
  }
  tabExec.addEventListener("click", () => show(true));
  tabMembers.addEventListener("click", () => show(false));
  show(true);
</script>
<script>
  /* mobile menu toggle */
  (function(){
    const t=document.getElementById("navToggle"), m=document.getElementById("mobileMenu"),
          io=document.getElementById("navIconOpen"), ic=document.getElementById("navIconClose");
    if(!t||!m) return;
    function set(open){ m.classList.toggle("hidden",!open); t.setAttribute("aria-expanded",open); io.classList.toggle("hidden",open); ic.classList.toggle("hidden",!open); }
    t.addEventListener("click",()=>set(m.classList.contains("hidden")));
    m.querySelectorAll("a").forEach(a=>a.addEventListener("click",()=>set(false)));
  })();
</script>
</body>
</html>
